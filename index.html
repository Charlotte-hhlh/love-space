<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>💕 我们的恋爱空间</title>
    <style>
        /* --- 重置 & 全局 --- */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: -apple-system, "PingFang SC", "Helvetica Neue", sans-serif;
            background: #fdf6f7;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: flex-start;
            padding: 20px 16px 40px;
        }
        .app-container {
            max-width: 420px;
            width: 100%;
            background: rgba(255, 255, 255, 0.75);
            backdrop-filter: blur(20px);
            border-radius: 40px;
            padding: 28px 24px 32px;
            box-shadow: 0 20px 60px rgba(255, 150, 180, 0.20);
            border: 1px solid rgba(255, 255, 255, 0.5);
        }

        /* --- 头部 --- */
        .header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            margin-bottom: 24px;
            flex-wrap: wrap;
        }
        .date-main {
            font-size: 18px;
            font-weight: 600;
            color: #3d2c33;
        }
        .date-weekday {
            font-size: 13px;
            color: #b58a95;
            margin-top: 2px;
        }
        .days-counter {
            background: linear-gradient(135deg, #ff9aae, #ffb6c9);
            padding: 8px 18px;
            border-radius: 30px;
            color: #fff;
            font-weight: 600;
            font-size: 17px;
            box-shadow: 0 6px 16px rgba(255, 150, 180, 0.35);
            white-space: nowrap;
            display: flex;
            align-items: center;
            gap: 6px;
        }
        .days-counter span {
            font-size: 20px;
            margin-right: 2px;
        }

        /* --- 导航 Tab --- */
        .nav-tabs {
            display: flex;
            gap: 4px;
            margin-bottom: 20px;
            background: rgba(255, 245, 247, 0.5);
            border-radius: 16px;
            padding: 4px;
            border: 1px solid rgba(255, 200, 210, 0.15);
            overflow-x: auto;
            flex-wrap: nowrap;
        }
        .nav-tab {
            flex: 1;
            padding: 10px 0;
            border: none;
            border-radius: 13px;
            background: transparent;
            font-size: 13px;
            font-weight: 500;
            color: #b58a95;
            cursor: pointer;
            transition: 0.3s;
            font-family: inherit;
            white-space: nowrap;
            text-align: center;
        }
        .nav-tab.active {
            background: rgba(255, 255, 255, 0.7);
            color: #3d2c33;
            box-shadow: 0 2px 8px rgba(255, 150, 180, 0.15);
        }
        .page {
            display: none;
        }
        .page.active {
            display: block;
        }

        /* --- 通用组件 --- */
        .section-title {
            font-size: 15px;
            font-weight: 600;
            color: #3d2c33;
            margin-bottom: 12px;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .section-title .badge {
            background: #ffb6c9;
            color: #fff;
            font-size: 11px;
            border-radius: 20px;
            padding: 0 10px;
            height: 20px;
            line-height: 20px;
            font-weight: 500;
        }
        .btn-add {
            padding: 10px 20px;
            border-radius: 16px;
            border: none;
            background: linear-gradient(135deg, #ff9aae, #ffb6c9);
            color: #fff;
            font-weight: 600;
            font-size: 14px;
            cursor: pointer;
            transition: 0.2s;
            font-family: inherit;
            white-space: nowrap;
        }
        .btn-add:active {
            transform: scale(0.95);
        }
        .todo-list {
            background: rgba(255, 245, 247, 0.4);
            border-radius: 16px;
            padding: 4px 0;
            min-height: 60px;
            border: 1px solid rgba(255, 200, 210, 0.15);
        }
        .todo-item {
            display: flex;
            align-items: center;
            padding: 10px 14px;
            border-bottom: 1px solid rgba(255, 200, 210, 0.12);
            gap: 10px;
            flex-wrap: wrap;
        }
        .todo-item:last-child {
            border-bottom: none;
        }
        .todo-checkbox {
            width: 22px;
            height: 22px;
            border-radius: 50%;
            border: 2px solid #e8c8d0;
            flex-shrink: 0;
            cursor: pointer;
            transition: 0.2s;
            display: flex;
            align-items: center;
            justify-content: center;
            background: #fff;
        }
        .todo-checkbox:hover {
            border-color: #ff9aae;
        }
        .todo-checkbox.done {
            background: #ff9aae;
            border-color: #ff9aae;
        }
        .todo-checkbox.done::after {
            content: "✓";
            color: #fff;
            font-size: 13px;
            font-weight: 700;
        }
        .todo-text {
            flex: 1;
            font-size: 14px;
            color: #3d2c33;
            word-break: break-word;
            min-width: 80px;
        }
        .todo-tag {
            font-size: 10px;
            background: #f0e0e5;
            padding: 2px 10px;
            border-radius: 20px;
            color: #7a5a66;
            font-weight: 500;
            flex-shrink: 0;
        }
        .todo-category {
            font-size: 10px;
            background: #dce8f0;
            padding: 2px 10px;
            border-radius: 20px;
            color: #4a6a7a;
            font-weight: 500;
            flex-shrink: 0;
        }
        .todo-delete {
            background: none;
            border: none;
            color: #d4b8c2;
            cursor: pointer;
            font-size: 16px;
            padding: 0 4px;
            flex-shrink: 0;
            transition: 0.2s;
        }
        .todo-delete:active {
            transform: scale(1.2);
            color: #ff6b8a;
        }
        .todo-empty {
            padding: 20px 16px;
            text-align: center;
            color: #b58a95;
            font-size: 14px;
        }
        .todo-empty span {
            font-size: 24px;
            display: block;
            margin-bottom: 6px;
        }
        .footer-note {
            text-align: center;
            margin-top: 24px;
            font-size: 11px;
            color: #d4b8c2;
            letter-spacing: 1px;
            border-top: 1px solid rgba(255, 200, 210, 0.20);
            padding-top: 18px;
        }

        /* --- 搜索 + 筛选标签 --- */
        .filter-bar {
            display: flex;
            flex-direction: column;
            gap: 12px;
            margin-bottom: 16px;
        }
        .search-box {
            width: 100%;
            padding: 10px 14px;
            border-radius: 16px;
            border: 1.5px solid #f0dce2;
            background: rgba(255, 255, 255, 0.6);
            font-size: 14px;
            outline: none;
            font-family: inherit;
            color: #3d2c33;
            transition: 0.2s;
        }
        .search-box:focus {
            border-color: #ff9aae;
            background: #fff;
        }
        .search-box::placeholder {
            color: #c8aeb8;
        }
        .filter-tags {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
        }
        .filter-tag {
            padding: 4px 14px;
            border-radius: 20px;
            border: 1.5px solid #f0dce2;
            background: transparent;
            font-size: 12px;
            font-weight: 500;
            color: #7a5a66;
            cursor: pointer;
            transition: 0.3s;
            font-family: inherit;
        }
        .filter-tag.active {
            background: #ffb6c9;
            border-color: #ffb6c9;
            color: #fff;
        }
        .filter-tag:active {
            transform: scale(0.95);
        }

        /* --- 四象限 --- */
        .matrix-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
        }
        .quadrant {
            background: rgba(255, 245, 247, 0.4);
            border-radius: 16px;
            padding: 12px 14px;
            min-height: 80px;
            border: 1px solid rgba(255, 200, 210, 0.15);
        }
        .quadrant-title {
            font-size: 12px;
            font-weight: 600;
            color: #7a5a66;
            margin-bottom: 8px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .quadrant-title select {
            font-size: 10px;
            padding: 2px 6px;
            border-radius: 10px;
            border: 1px solid #f0dce2;
            background: rgba(255, 255, 255, 0.6);
            color: #7a5a66;
            outline: none;
            font-family: inherit;
            cursor: pointer;
        }
        .quadrant-item {
            font-size: 13px;
            color: #3d2c33;
            padding: 4px 0;
            border-bottom: 1px dashed rgba(255, 200, 210, 0.2);
            display: flex;
            align-items: center;
            gap: 6px;
            flex-wrap: wrap;
        }
        .quadrant-item:last-child {
            border-bottom: none;
        }
        .quadrant-empty {
            font-size: 12px;
            color: #c8aeb8;
        }
        .q-dot {
            font-size: 8px;
            color: #ff9aae;
        }

        /* --- 日历 --- */
        .calendar-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 12px;
        }
        .calendar-header button {
            background: none;
            border: none;
            font-size: 20px;
            cursor: pointer;
            color: #b58a95;
            padding: 4px 12px;
        }
        .calendar-grid {
            display: grid;
            grid-template-columns: repeat(7, 1fr);
            gap: 4px;
            text-align: center;
        }
        .calendar-grid .weekday {
            font-size: 11px;
            color: #b58a95;
            padding: 6px 0;
            font-weight: 500;
        }
        .calendar-grid .day {
            padding: 8px 0;
            border-radius: 12px;
            font-size: 14px;
            color: #3d2c33;
            cursor: pointer;
            transition: 0.2s;
            position: relative;
        }
        .calendar-grid .day:active {
            transform: scale(0.92);
        }
        .calendar-grid .day.today {
            background: #ff9aae;
            color: #fff;
            font-weight: 600;
        }
        .calendar-grid .day.has-todo::after {
            content: "";
            position: absolute;
            bottom: 4px;
            left: 50%;
            transform: translateX(-50%);
            width: 4px;
            height: 4px;
            border-radius: 50%;
            background: #ff9aae;
        }
        .calendar-grid .day.today.has-todo::after {
            background: #fff;
        }
        .calendar-grid .day.other-month {
            color: #d4b8c2;
        }
        .calendar-grid .day.selected {
            background: #f0e0e5;
            font-weight: 600;
        }

        /* --- 相册 --- */
        .photo-upload-area {
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 30px 20px;
            border: 2px dashed #f0dce2;
            border-radius: 20px;
            margin-bottom: 20px;
            background: rgba(255, 245, 247, 0.3);
            cursor: pointer;
            transition: 0.3s;
        }
        .photo-upload-area:active {
            transform: scale(0.98);
        }
        .photo-upload-area .icon {
            font-size: 40px;
            margin-bottom: 8px;
        }
        .photo-upload-area input {
            display: none;
        }
        .photo-timeline {
            display: flex;
            flex-direction: column;
            gap: 20px;
            max-height: 500px;
            overflow-y: auto;
            padding-bottom: 8px;
        }
        .photo-group {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }
        .photo-group .group-date {
            font-size: 13px;
            font-weight: 600;
            color: #b58a95;
            padding-left: 12px;
            border-left: 3px solid #ffb6c9;
        }
        .photo-card {
            display: flex;
            gap: 14px;
            padding: 12px;
            background: rgba(255, 245, 247, 0.5);
            border-radius: 16px;
            border: 1px solid rgba(255, 200, 210, 0.12);
            align-items: center;
            cursor: pointer;
            transition: 0.2s;
        }
        .photo-card:active {
            transform: scale(0.98);
        }
        .photo-card .thumb {
            width: 70px;
            height: 70px;
            border-radius: 12px;
            background: #f0e0e5;
            flex-shrink: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 30px;
            overflow: hidden;
        }
        .photo-card .thumb img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }
        .photo-card .info {
            flex: 1;
            min-width: 0;
        }
        .photo-card .info .caption {
            font-size: 14px;
            color: #3d2c33;
            font-weight: 500;
        }
        .photo-card .info .meta {
            font-size: 11px;
            color: #b58a95;
            margin-top: 4px;
        }
        .photo-card .info .meta .who {
            background: #f0e0e5;
            padding: 1px 10px;
            border-radius: 12px;
            font-size: 10px;
            color: #7a5a66;
        }
        .photo-delete-btn {
            background: none;
            border: none;
            color: #d4b8c2;
            cursor: pointer;
            font-size: 16px;
            padding: 4px 8px;
            flex-shrink: 0;
            transition: 0.2s;
        }
        .photo-delete-btn:active {
            transform: scale(1.2);
            color: #ff6b8a;
        }
        .photo-empty {
            text-align: center;
            padding: 30px 20px;
            color: #b58a95;
            font-size: 14px;
        }

        /* --- 复盘卡片样式 --- */
        .review-card {
            background: rgba(255, 245, 247, 0.5);
            border-radius: 16px;
            padding: 14px 16px;
            border: 1px solid rgba(255, 200, 210, 0.15);
            margin-bottom: 12px;
        }
        .review-card .review-header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            margin-bottom: 8px;
            flex-wrap: wrap;
            gap: 6px;
        }
        .review-card .review-title {
            font-size: 15px;
            font-weight: 600;
            color: #3d2c33;
            flex: 1;
        }
        .review-card .review-meta {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
            align-items: center;
        }
        .review-card .review-type {
            font-size: 11px;
            padding: 2px 12px;
            border-radius: 20px;
            background: #ffb6c9;
            color: #fff;
            font-weight: 500;
        }
        .review-card .review-tag {
            font-size: 10px;
            padding: 2px 10px;
            border-radius: 20px;
            background: #f0e0e5;
            color: #7a5a66;
        }
        .review-card .review-date {
            font-size: 11px;
            color: #b58a95;
        }
        .review-card .review-section {
            margin-top: 8px;
            padding-top: 8px;
            border-top: 1px dashed rgba(255, 200, 210, 0.3);
        }
        .review-card .review-section-label {
            font-size: 11px;
            font-weight: 600;
            color: #7a5a66;
            margin-bottom: 2px;
        }
        .review-card .review-section-content {
            font-size: 13px;
            color: #3d2c33;
            line-height: 1.5;
            white-space: pre-wrap;
            word-break: break-word;
        }
        .review-card .review-delete {
            background: none;
            border: none;
            color: #d4b8c2;
            cursor: pointer;
            font-size: 14px;
            padding: 0 4px;
            flex-shrink: 0;
            transition: 0.2s;
        }
        .review-card .review-delete:active {
            color: #ff6b8a;
            transform: scale(1.2);
        }

        /* --- 图片查看弹窗 --- */
        .lightbox-overlay {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.85);
            z-index: 9999;
            justify-content: center;
            align-items: center;
            padding: 20px;
            animation: fadeIn 0.3s;
        }
        .lightbox-overlay.show {
            display: flex;
        }
        .lightbox-overlay img {
            max-width: 100%;
            max-height: 85vh;
            border-radius: 16px;
            object-fit: contain;
        }
        .lightbox-overlay .close-btn {
            position: fixed;
            top: 20px;
            right: 24px;
            color: #fff;
            font-size: 32px;
            cursor: pointer;
            background: none;
            border: none;
            opacity: 0.7;
            transition: 0.3s;
        }
        .lightbox-overlay .close-btn:hover {
            opacity: 1;
        }
        @keyframes fadeIn {
            from {
                opacity: 0;
            }
            to {
                opacity: 1;
            }
        }

        /* --- 响应式 --- */
        @media (max-width: 420px) {
            .app-container {
                padding: 20px 16px 24px;
            }
            .btn-add {
                padding: 10px 14px;
                font-size: 13px;
            }
            .photo-card .thumb {
                width: 55px;
                height: 55px;
            }
            .review-card .review-title {
                font-size: 14px;
            }
        }
        @media (max-width: 380px) {
            .days-counter {
                font-size: 14px;
                padding: 6px 14px;
            }
            .matrix-grid {
                gap: 6px;
            }
            .filter-tags {
                gap: 4px;
            }
            .filter-tag {
                font-size: 11px;
                padding: 2px 10px;
            }
        }
    </style>
</head>
<body>

    <div class="app-container">
        <!-- 头部 -->
        <div class="header">
            <div class="date-section">
                <div class="date-main" id="todayDate">加载中...</div>
                <div class="date-weekday" id="todayWeekday">加载中...</div>
            </div>
            <div class="days-counter">
                <span>❤️</span> 第 <span id="daysCount">??</span> 天
            </div>
        </div>

        <!-- 导航 -->
        <div class="nav-tabs" id="navTabs">
            <button class="nav-tab active" data-page="page-todo">📋 待办</button>
            <button class="nav-tab" data-page="page-matrix">🎯 四象限</button>
            <button class="nav-tab" data-page="page-calendar">📅 日历</button>
            <button class="nav-tab" data-page="page-photo">📷 相册</button>
            <button class="nav-tab" data-page="page-review">💭 复盘</button>
        </div>

        <!-- ========================================================== -->
        <!-- 页面1：待办 -->
        <!-- ========================================================== -->
        <div class="page active" id="page-todo">
            <div class="add-todo-area" style="display:flex; gap:10px; margin-bottom:16px; flex-wrap:wrap;">
                <input type="text" id="todoInput" placeholder="写一件待办..." style="flex:1; min-width:120px; padding:10px 14px; border-radius:16px; border:1.5px solid #f0dce2; background:rgba(255,255,255,0.6); font-size:14px; outline:none; font-family:inherit; color:#3d2c33;" />
                <select id="todoCategory" style="padding:10px 12px; border-radius:16px; border:1.5px solid #f0dce2; background:rgba(255,255,255,0.6); font-size:13px; outline:none; color:#3d2c33; font-family:inherit; cursor:pointer;">
                    <option value="日常">📌 日常</option>
                    <option value="电影">🎬 电影</option>
                    <option value="心愿">✨ 心愿</option>
                    <option value="购物">🛒 购物</option>
                    <option value="书单">📚 书单</option>
                    <option value="旅行">✈️ 旅行</option>
                </select>
                <select id="todoTag" style="padding:10px 12px; border-radius:16px; border:1.5px solid #f0dce2; background:rgba(255,255,255,0.6); font-size:13px; outline:none; color:#3d2c33; font-family:inherit; cursor:pointer;">
                    <option value="重要紧急">🔥 重要紧急</option>
                    <option value="重要不紧急">🌱 重要不紧急</option>
                    <option value="不重要紧急">⏰ 不重要紧急</option>
                    <option value="不重要不紧急">☁️ 不重要不紧急</option>
                </select>
                <button class="btn-add" id="addBtn">➕ 添加</button>
            </div>

            <div class="filter-bar">
                <input type="text" class="search-box" id="searchInput" placeholder="🔍 搜索待办..." />
                <div class="filter-tags" id="filterTags">
                    <button class="filter-tag active" data-filter="all">📌 全部</button>
                    <button class="filter-tag" data-filter="日常">📌 日常</button>
                    <button class="filter-tag" data-filter="电影">🎬 电影</button>
                    <button class="filter-tag" data-filter="心愿">✨ 心愿</button>
                    <button class="filter-tag" data-filter="购物">🛒 购物</button>
                    <button class="filter-tag" data-filter="书单">📚 书单</button>
                    <button class="filter-tag" data-filter="旅行">✈️ 旅行</button>
                </div>
            </div>

            <div class="section-title">
                📋 全部未完成
                <span class="badge" id="todoCount">0</span>
            </div>
            <div class="todo-list" id="todoList">
                <div class="todo-empty"><span>⏳</span>加载中...</div>
            </div>
        </div>

        <!-- ========================================================== -->
        <!-- 页面2：四象限 -->
        <!-- ========================================================== -->
        <div class="page" id="page-matrix">
            <div class="section-title">🎯 四象限矩阵</div>
            <div class="matrix-grid" id="matrixGrid">
                <div class="quadrant" data-quadrant="1">
                    <div class="quadrant-title">
                        <span>🔥 重要·紧急</span>
                        <select class="quadrant-filter" data-quadrant="1">
                            <option value="all">全部</option>
                            <option value="日常">📌 日常</option>
                            <option value="电影">🎬 电影</option>
                            <option value="心愿">✨ 心愿</option>
                            <option value="购物">🛒 购物</option>
                            <option value="书单">📚 书单</option>
                            <option value="旅行">✈️ 旅行</option>
                        </select>
                    </div>
                    <div id="q1-list"></div>
                </div>
                <div class="quadrant" data-quadrant="2">
                    <div class="quadrant-title">
                        <span>🌱 重要·不紧急</span>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js">

    <script>
        // ============================================================
        // 🔑 修改这三行！！！
        // ============================================================
        var SUPABASE_URL = 'https://fsmgeesifwqfhpdndzmg.supabase.co';
        var SUPABASE_KEY = 'sb_publishable_t2AMEoq4SSfwXaGUSQ6opA_UBUuqwfs';
        var START_DATE = '2026-06-10';

        var supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        // ---- 工具函数 ----
        function formatDate(d) {
            return d.getFullYear() + '年' + String(d.getMonth() + 1).padStart(2, '0') + '月' + String(d.getDate()).padStart(2,
                '0') + '日';
        }

        function getWeekday(d) {
            return ['星期日', '星期一', '星期二', '星期三', '星期四', '星期五', '星期六'][d.getDay()];
        }

        function daysBetween(d1, d2) {
            return Math.floor((d2 - d1) / (1000 * 60 * 60 * 24));
        }

        function formatDateKey(d) {
            return d.getFullYear() + '-' + String(d.getMonth() + 1).padStart(2, '0') + '-' + String(d.getDate()).padStart(2,
                '0');
        }

        function escapeHtml(text) {
            if (!text) return '';
            var div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        function getQuadrant(tag) {
            var map = { '重要紧急': 1, '重要不紧急': 2, '不重要紧急': 3, '不重要不紧急': 4 };
            return map[tag] || 0;
        }

        function getCategoryEmoji(cat) {
            var map = { '日常': '📌', '电影': '🎬', '心愿': '✨', '购物': '🛒', '书单': '📚', '旅行': '✈️' };
            return map[cat] || '📌';
        }

        function getFullImageUrl(url) {
            if (!url) return '';
            if (url.startsWith('http://') || url.startsWith('https://')) return url;
            var baseUrl = SUPABASE_URL.replace(/\/+$/, '');
            if (url.startsWith('/')) return baseUrl + url;
            return baseUrl + '/storage/v1/object/public/' + url;
        }

        var today = new Date();
        document.getElementById('todayDate').textContent = formatDate(today);
        document.getElementById('todayWeekday').textContent = getWeekday(today);
        var start = new Date(START_DATE);
        document.getElementById('daysCount').textContent = Math.max(0, daysBetween(start, today));
        var todayKey = formatDateKey(today);

        // ---- 全局数据缓存 ----
        var allTodos = [];

        // ============================================================
        // 1. 待办（含搜索 + 分类筛选）
        // ============================================================
        var currentFilter = 'all';
        var currentSearch = '';

        function filterTodos(todos) {
            return todos.filter(function(t) {
                if (currentFilter !== 'all' && t.category !== currentFilter) return false;
                if (currentSearch.trim() !== '' && t.title.indexOf(currentSearch.trim()) === -1) return false;
                return true;
            });
        }

        function renderTodoList(todos) {
            var container = document.getElementById('todoList');
            var countBadge = document.getElementById('todoCount');
            var filtered = filterTodos(todos);

            if (filtered.length === 0) {
                container.innerHTML = '<div class="todo-empty"><span>🎉</span>没有匹配的待办</div>';
                countBadge.textContent = '0';
                return;
            }

            var html = '';
            filtered.forEach(function(t) {
                var catEmoji = getCategoryEmoji(t.category);
                var tagDisplay = t.tag || '未分类';
                html += `
                        <div class="todo-item">
                            <div class="todo-checkbox" onclick="toggleTodo('${t.id}')"></div>
                            <span class="todo-text">${escapeHtml(t.title)}</span>
                            <span class="todo-category">${catEmoji} ${escapeHtml(t.category || '日常')}</span>
                            <span class="todo-tag">${escapeHtml(tagDisplay)}</span>
                            <button class="todo-delete" onclick="deleteTodo('${t.id}')">✕</button>
                        </div>
                    `;
            });
            container.innerHTML = html;
            countBadge.textContent = filtered.length;
        }

        async function loadTodos() {
            try {
                var result = await supabase.from('todos').select('*').eq('done', false).order('created_at', { ascending: false });
                if (result.error) { return; }
                allTodos = result.data || [];
                renderTodoList(allTodos);
                loadMatrix();
                renderCalendar(currentYear, currentMonth);
            } catch (e) { /* ignore */ }
        }

        document.getElementById('searchInput').addEventListener('input', function() {
            currentSearch = this.value;
            renderTodoList(allTodos);
        });

        document.querySelectorAll('.filter-tag').forEach(function(tag) {
            tag.addEventListener('click', function() {
                document.querySelectorAll('.filter-tag').forEach(function(t) { t.classList.remove('active'); });
                this.classList.add('active');
                currentFilter = this.dataset.filter;
                renderTodoList(allTodos);
            });
        });

        window.toggleTodo = async function(id) {
            try {
                var result = await supabase.from('todos').select('done').eq('id', id).single();
                if (result.error) { alert('操作失败'); return; }
                await supabase.from('todos').update({ done: !result.data.done }).eq('id', id);
                await loadTodos();
            } catch (e) { alert('操作失败'); }
        }

        window.deleteTodo = async function(id) {
            if (!confirm('确定要删除吗？')) return;
            try { await supabase.from('todos').delete().eq('id', id);
                await loadTodos(); } catch (e) { alert('删除失败'); }
        }

        async function addTodo() {
            var input = document.getElementById('todoInput');
            var category = document.getElementById('todoCategory').value;
            var tag = document.getElementById('todoTag').value;
            var title = input.value.trim();
            if (!title) { alert('请输入内容 📝'); return; }
            try {
                await supabase.from('todos').insert({
                    title: title,
                    tag: tag,
                    category: category,
                    done: false,
                    date: todayKey,
                    created_by: '我'
                });
                input.value = '';
                await loadTodos();
            } catch (e) { alert('添加失败'); }
        }

        document.getElementById('addBtn').addEventListener('click', addTodo);
        document.getElementById('todoInput').addEventListener('keydown', function(e) { if (e.key === 'Enter') addTodo(); });

        // ============================================================
        // 2. 四象限
        // ============================================================
        var quadrantFilters = { 1: 'all', 2: 'all', 3: 'all', 4: 'all' };

        function getQuadrantItems(quadrant) {
            var filtered = allTodos.filter(function(t) {
                if (getQuadrant(t.tag) !== quadrant) return false;
                var filter = quadrantFilters[quadrant];
                if (filter !== 'all' && t.category !== filter) return false;
                return true;
            });
            return filtered;
        }

        function renderQuadrant(quadrant) {
            var container = document.getElementById('q' + quadrant + '-list');
            var items = getQuadrantItems(quadrant);
            if (items.length === 0) {
                container.innerHTML = '<div class="quadrant-empty">—</div>';
                return;
            }
            var html = '';
            items.forEach(function(t) {
                html += `
                        <div class="quadrant-item">
                            <span class="q-dot">●</span>
                            <span style="flex:1;">${escapeHtml(t.title)}</span>
                            <span style="font-size:10px;color:#b58a95;">${getCategoryEmoji(t.category)}</span>
                            <button onclick="toggleTodo('${t.id}')" style="background:none;border:none;color:#4CAF50;cursor:pointer;font-size:14px;" title="完成">✅</button>
                            <button onclick="deleteTodo('${t.id}')" style="background:none;border:none;color:#d4b8c2;cursor:pointer;font-size:14px;" title="删除">✕</button>
                        </div>
                    `;
            });
            container.innerHTML = html;
        }

        function loadMatrix() {
            for (var i = 1; i <= 4; i++) {
                renderQuadrant(i);
            }
        }

        document.querySelectorAll('.quadrant-filter').forEach(function(select) {
            select.addEventListener('change', function() {
                var q = parseInt(this.dataset.quadrant);
                quadrantFilters[q] = this.value;
                renderQuadrant(q);
            });
        });

        // ============================================================
        // 3. 日历
        // ============================================================
        var currentYear = today.getFullYear();
        var currentMonth = today.getMonth();
        var selectedDateKey = todayKey;

        function renderCalendar(year, month) {
            var grid = document.getElementById('calendarGrid');
            document.getElementById('monthYear').textContent = year + '年' + String(month + 1).padStart(2, '0') + '月';
            var firstDay = new Date(year, month, 1).getDay();
            var daysInMonth = new Date(year, month + 1, 0).getDate();
            var daysInPrevMonth = new Date(year, month, 0).getDate();
            var weekdays = ['日', '一', '二', '三', '四', '五', '六'];
            var html = '';
            weekdays.forEach(function(w) { html += '<div class="weekday">' + w + '</div>'; });
            for (var i = firstDay - 1; i >= 0; i--) { html += '<div class="day other-month">' + (daysInPrevMonth - i) +
                '</div>'; }
            var todayStr = formatDateKey(today);
            for (var d = 1; d <= daysInMonth; d++) {
                var dateKey = year + '-' + String(month + 1).padStart(2, '0') + '-' + String(d).padStart(2, '0');
                var classes = 'day';
                if (dateKey === todayStr) classes += ' today';
                if (dateKey === selectedDateKey) classes += ' selected';
                html += '<div class="' + classes + '" onclick="selectDate(\'' + dateKey + '\')">' + d + '</div>';
            }
            grid.innerHTML = html;
            loadCalendarTodos(selectedDateKey);
            markCalendarDates(year, month);
            var label = document.getElementById('calendarSelectedDateLabel');
            if (selectedDateKey) {
                var parts = selectedDateKey.split('-');
                label.textContent = parts[0] + '年' + parts[1] + '月' + parts[2] + '日';
            } else {
                label.textContent = '选中日期';
            }
        }

        async function markCalendarDates(year, month) {
            var startDate = year + '-' + String(month + 1).padStart(2, '0') + '-01';
            var endDate = year + '-' + String(month + 1).padStart(2, '0') + '-' + String(new Date(year, month + 1, 0)
                .getDate()).padStart(2, '0');
            try {
                var result = await supabase.from('todos').select('date').gte('date', startDate).lte('date', endDate);
                if (result.error || !result.data) return;
                var dates = {};
                result.data.forEach(function(t) { dates[t.date] = true; });
                var days = document.querySelectorAll('.calendar-grid .day:not(.other-month)');
                days.forEach(function(el) {
                    var d = parseInt(el.textContent);
                    var dateKey = year + '-' + String(month + 1).padStart(2, '0') + '-' + String(d).padStart(2,
                    '0');
                    if (dates[dateKey]) el.classList.add('has-todo');
                });
            } catch (e) { /* ignore */ }
        }

        window.selectDate = function(dateKey) {
            selectedDateKey = dateKey;
            renderCalendar(currentYear, currentMonth);
            loadCalendarTodos(dateKey);
        }

        async function loadCalendarTodos(dateKey) {
            var container = document.getElementById('calendarTodoList');
            try {
                var result = await supabase.from('todos').select('*').eq('date', dateKey).order('created_at', { ascending: false });
                if (result.error || !result.data || result.data.length === 0) {
                    container.innerHTML = '<div class="todo-empty">✨ 这天没有待办</div>';
                    return;
                }
                var html = '';
                result.data.forEach(function(t) {
                    var doneClass = t.done ? 'done' : '';
                    var textClass = t.done ? 'done-text' : '';
                    html += `
                            <div class="todo-item">
                                <div class="todo-checkbox ${doneClass}" onclick="toggleTodo('${t.id}')"></div>
                                <span class="todo-text ${textClass}">${escapeHtml(t.title)}</span>
                                <span class="todo-tag">${escapeHtml(t.tag || '未分类')}</span>
                                <button class="todo-delete" onclick="deleteTodo('${t.id}')">✕</button>
                            </div>
                        `;
                });
                container.innerHTML = html;
            } catch (e) {
                container.innerHTML = '<div class="todo-empty">⚠️ 加载失败</div>';
            }
        }

        document.getElementById('prevMonth').addEventListener('click', function() {
            currentMonth--;
            if (currentMonth < 0) { currentMonth = 11;
                currentYear--; }
            renderCalendar(currentYear, currentMonth);
        });
        document.getElementById('nextMonth').addEventListener('click', function() {
            currentMonth++;
            if (currentMonth > 11) { currentMonth = 0;
                currentYear++; }
            renderCalendar(currentYear, currentMonth);
        });

        // ============================================================
        // 4. 相册
        // ============================================================
        var photoInput = document.getElementById('photoInput');
        var photoTimeline = document.getElementById('photoTimeline');

        async function uploadPhotos(files) {
            for (var i = 0; i < files.length; i++) {
                var file = files[i];
                var fileExt = file.name.split('.').pop();
                var fileName = Date.now() + '_' + Math.random().toString(36).substring(2, 6) + '.' + fileExt;
                var filePath = 'photos/' + fileName;
                try {
                    var uploadResult = await supabase.storage.from('love-photos').upload(filePath, file);
                    if (uploadResult.error) { console.error('上传失败:', uploadResult.error); continue; }
                    var urlResult = supabase.storage.from('love-photos').getPublicUrl(filePath);
                    var photoUrl = urlResult.data.publicUrl;
                    var caption = prompt('📝 给这张照片加一句说明吧：', file.name);
                    await supabase.from('photos').insert({
                        image_url: photoUrl,
                        caption: caption || file.name,
                        date: todayKey,
                        created_by: '我'
                    });
                } catch (e) { console.error('上传出错:', e); }
            }
            loadPhotos();
        }

        function openLightbox(imageUrl) {
            document.getElementById('lightboxImage').src = imageUrl;
            document.getElementById('lightbox').classList.add('show');
            document.body.style.overflow = 'hidden';
        }

        window.closeLightbox = function() {
            document.getElementById('lightbox').classList.remove('show');
            document.body.style.overflow = '';
        }

        document.getElementById('lightbox').addEventListener('click', function(e) {
            if (e.target === this) closeLightbox();
        });
        document.addEventListener('keydown', function(e) {
            if (e.key === 'Escape') closeLightbox();
        });

        async function loadPhotos() {
            try {
                var result = await supabase.from('photos').select('*').order('created_at', { ascending: false });
                if (result.error || !result.data || result.data.length === 0) {
                    photoTimeline.innerHTML = '<div class="photo-empty">📸 还没有照片，记录你们的时刻吧 💕</div>';
                    return;
                }
                var data = result.data;
                var html = '';
                var currentGroupDate = '';
                data.forEach(function(p) {
                    var displayDate = p.date || '未知日期';
                    if (displayDate !== currentGroupDate) {
                        if (currentGroupDate !== '') html += '</div>';
                        html += '<div class="photo-group">';
                        html += '<div class="group-date">📅 ' + displayDate + '</div>';
                        currentGroupDate = displayDate;
                    }
                    var imageUrl = getFullImageUrl(p.image_url);
                    var imgHtml = imageUrl ?
                        '<img src="' + imageUrl + '" alt="照片" loading="lazy" onerror="this.parentElement.innerHTML=\'📷\'" />' :
                        '📷';
                    html += `
                            <div class="photo-card" onclick="openLightbox('${imageUrl}')">
                                <div class="thumb">${imgHtml}</div>
                                <div class="info">
                                    <div class="caption">${escapeHtml(p.caption || '无说明 💭')}</div>
                                    <div class="meta">
                                        <span class="who">${escapeHtml(p.created_by || '我')}</span>
                                        ${p.created_at ? ' · ' + new Date(p.created_at).toLocaleTimeString('zh-CN', {hour:'2-digit', minute:'2-digit'}) : ''}
                                    </div>
                                </div>
                                <button class="photo-delete-btn" onclick="event.stopPropagation();deletePhoto('${p.id}')">✕</button>
                            </div>
                        `;
                });
                html += '</div>';
                photoTimeline.innerHTML = html;
            } catch (e) {
                console.error('加载照片失败:', e);
                photoTimeline.innerHTML = '<div class="photo-empty">⚠️ 加载失败</div>';
            }
        }

        async function deletePhoto(id) {
            if (!confirm('确定要删除这张照片吗？')) return;
            try {
                var result = await supabase.from('photos').select('image_url').eq('id', id).single();
                if (result.data && result.data.image_url) {
                    var urlParts = result.data.image_url.split('/');
                    var filePath = 'photos/' + urlParts[urlParts.length - 1];
                    await supabase.storage.from('love-photos').remove([filePath]);
                }
                await supabase.from('photos').delete().eq('id', id);
                loadPhotos();
            } catch (e) { alert('删除失败'); }
        }

        photoInput.addEventListener('change', function(e) {
            if (this.files.length > 0) {
                uploadPhotos(this.files);
                this.value = '';
            }
        });
        document.getElementById('photoUploadArea').addEventListener('click', function() {
            photoInput.click();
        });

        // ============================================================
        // 5. 复盘（结构化）
        // ============================================================
        var reviewModal = document.getElementById('reviewModal');

        function openReviewModal() {
            reviewModal.classList.add('show');
            document.getElementById('reviewFact').value = '';
            document.getElementById('reviewFeeling').value = '';
            document.getElementById('reviewGrowth').value = '';
            document.getElementById('reviewType').value = '吵架';
            document.getElementById('reviewTag').value = '信任';
        }

        function closeReviewModal() {
            reviewModal.classList.remove('show');
        }
        document.getElementById('openReviewBtn').addEventListener('click', openReviewModal);
        reviewModal.addEventListener('click', function(e) {
            if (e.target === this) closeReviewModal();
        });

        window.submitReview = async function() {
            var type = document.getElementById('reviewType').value;
            var tag = document.getElementById('reviewTag').value;
            var fact = document.getElementById('reviewFact').value.trim();
            var feeling = document.getElementById('reviewFeeling').value.trim();
            var growth = document.getElementById('reviewGrowth').value.trim();

            if (!fact && !feeling && !growth) {
                alert('至少填写一个字段吧 📝');
                return;
            }

            var content = '';
            if (fact) content += '【发生了什么】\n' + fact + '\n\n';
            if (feeling) content += '【我的感受】\n' + feeling + '\n\n';
            if (growth) content += '【下次怎么做】\n' + growth;

            try {
                await supabase.from('reviews').insert({
                    title: type + ' - ' + tag,
                    content: content,
                    type: type,
                    tag: tag,
                    fact: fact,
                    feeling: feeling,
                    growth: growth,
                    created_by: '我'
                });
                closeReviewModal();
                loadReviews();
            } catch (e) {
                alert('保存失败: ' + e.message);
            }
        }

        async function loadReviews() {
            var container = document.getElementById('reviewList');
            try {
                var result = await supabase.from('reviews').select('*').order('created_at', { ascending: false });
                if (result.error || !result.data || result.data.length === 0) {
                    container.innerHTML = '<div class="todo-empty"><span>📖</span>还没有复盘记录...</div>';
                    return;
                }
                var html = '';
                result.data.forEach(function(r) {
                    var dateStr = r.created_at ? new Date(r.created_at).toLocaleDateString('zh-CN') : '未知日期';
                    var typeEmoji = { '吵架': '😤', '不满': '😞', '误会': '🤔', '感动时刻': '🥰', '深度沟通': '💬' };
                    var tagEmoji = { '信任': '🤝', '沟通': '💬', '安全感': '🛡️', '陪伴': '🤗', '未来规划': '🔮', '其他': '📌' };
                    html += `
                            <div class="review-card">
                                <div class="review-header">
                                    <span class="review-title">${escapeHtml(r.title)}</span>
                                    <div class="review-meta">
                                        <span class="review-type">${typeEmoji[r.type] || '📌'} ${escapeHtml(r.type || '')}</span>
                                        <span class="review-tag">${tagEmoji[r.tag] || '📌'} ${escapeHtml(r.tag || '')}</span>
                                        <button class="review-delete" onclick="deleteReview('${r.id}')">✕</button>
                                    </div>
                                </div>
                                <div style="font-size:11px; color:#b58a95; margin-bottom:6px;">${dateStr}</div>
                                ${r.fact ? `<div class="review-section"><div class="review-section-label">📌 发生了什么</div><div class="review-section-content">${escapeHtml(r.fact)}</div></div>` : ''}
                                ${r.feeling ? `<div class="review-section"><div class="review-section-label">💭 我的感受</div><div class="review-section-content">${escapeHtml(r.feeling)}</div></div>` : ''}
                                ${r.growth ? `<div class="review-section"><div class="review-section-label">🌱 下次怎么做</div><div class="review-section-content">${escapeHtml(r.growth)}</div></div>` : ''}
                            </div>
                        `;
                });
                container.innerHTML = html;
            } catch (e) {
                container.innerHTML = '<div class="todo-empty"><span>⚠️</span>加载失败</div>';
            }
        }

        window.deleteReview = async function(id) {
            if (!confirm('确定要删除这条复盘吗？')) return;
            try { await supabase.from('reviews').delete().eq('id', id);
                loadReviews(); } catch (e) { alert('删除失败'); }
        }

        // ============================================================
        // 导航切换
        // ============================================================
        document.querySelectorAll('.nav-tab').forEach(function(tab) {
            tab.addEventListener('click', function() {
                document.querySelectorAll('.nav-tab').forEach(function(t) { t.classList.remove('active'); });
                document.querySelectorAll('.page').forEach(function(p) { p.classList.remove('active'); });
                this.classList.add('active');
                document.getElementById(this.dataset.page).classList.add('active');
            });
        });

        // ============================================================
        // 初始化 Storage & 数据
        // ============================================================
        async function initStorage() {
            try {
                var buckets = await supabase.storage.listBuckets();
                var exists = false;
                if (buckets.data) {
                    for (var i = 0; i < buckets.data.length; i++) {
                        if (buckets.data[i].name === 'love-photos') { exists = true; break; }
                    }
                }
                if (!exists) {
                    await supabase.storage.createBucket('love-photos', { public: true });
                    console.log('✅ 相册存储已创建');
                }
            } catch (e) { console.log('存储初始化:', e.message); }
        }

        // 检查 reviews 表是否存在
        async function initReviewsTable() {
            try {
                var { error } = await supabase.from('reviews').select('id').limit(1);
                if (error && error.message && error.message.includes('relation "reviews" does not exist')) {
                    alert('⚠️ 请到 Supabase SQL Editor 运行以下代码创建 reviews 表：\n\n' +
                        'CREATE TABLE IF NOT EXISTS reviews (\n' +
                        '  id BIGSERIAL PRIMARY KEY,\n' +
                        '  title TEXT NOT NULL,\n' +
                        '  content TEXT,\n' +
                        '  type TEXT,\n' +
                        '  tag TEXT,\n' +
                        '  fact TEXT,\n' +
                        '  feeling TEXT,\n' +
                        '  growth TEXT,\n' +
                        '  created_by TEXT DEFAULT \'我\',\n' +
                        '  created_at TIMESTAMP WITH TIME ZONE DEFAULT NOW()\n' +
                        ');\n\n' +
                        'ALTER TABLE reviews REPLICA IDENTITY FULL;');
                }
            } catch (e) { /* ignore */ }
            loadReviews();
        }

        // 启动！
        renderCalendar(currentYear, currentMonth);
        loadTodos();
        loadPhotos();
        initStorage();
        initReviewsTable();
        console.log('💕 完整版恋爱空间已启动！');
    </script>
</body>
</html>
